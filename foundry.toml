[profile.default]
src = 'contracts'
test = 'test/solidity'
out = 'out'
libs = ['lib']
solc_version = "0.8.12"
auto_detect_solc = false
evm_version = "london"
optimizer = false
optimizer_runs = 200
via_ir = false
bytecode_hash = "ipfs"
cbor_metadata = true
use_literal_content = false
allow_internal_expect_revert = false

# See more config options https://github.com/gakonst/foundry/tree/master/config
