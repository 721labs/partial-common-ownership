name: "tests"

on:
  workflow_dispatch:
  push:
    branches:
      - "*" # All branches

permissions:
  contents: read

jobs:
  coverage:
    name: "coverage"
    runs-on: ubuntu-latest
    needs: []
    # SKIP: Retained only until the Forge coverage gate replaces it in Stage 7.
    if: False
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: "Install Node"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Run solidity-coverage"
        run: "pnpm run coverage"
  solhint:
    name: "solhint"
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: "Install Node"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Run solhint"
        run: "pnpm run solhint"
  tests:
    name: "Hardhat Tests"
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: "Install Node"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Validate dependency sources"
        run: "pnpm run lock:validate"
      - name: "Run tests"
        run: "pnpm run test:hardhat"
      - name: "Enforce dependency audit ratchet"
        run: "pnpm run audit:ratchet"
  forge-tests:
    name: "Forge Tests"
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: "Install Node"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Install Foundry"
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1
      - name: "Run tests"
        run: "pnpm run test:forge"
  package-consumers:
    name: "Compatibility and Package Consumers"
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: "Install Node"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Install Foundry"
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1
      - name: "Enforce compatibility manifest"
        run: "pnpm run compatibility"
      - name: "Test packed package consumers"
        run: "pnpm run test:package"
