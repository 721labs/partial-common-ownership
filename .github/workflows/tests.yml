name: "tests"

on:
  workflow_dispatch:
  push:
    branches:
      - "*" # All branches

permissions:
  contents: read

jobs:
  coverage:
    name: "coverage"
    runs-on: ubuntu-latest
    needs: []
    # SKIP: Is not compatible w/ Hardhat preprocessing configuration and resultantly will not remap Forge-installed dependencies.
    if: False
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: "Install Node"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.18.0"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"
      - name: "Enable Corepack"
        run: "corepack enable"
      - name: "Install JS Dependencies"
        run: "yarn install --frozen-lockfile --dev"
      - name: "Run solidity-coverage"
        run: "yarn coverage"
  solhint:
    name: "solhint"
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: "Install Node"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.18.0"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"
      - name: "Enable Corepack"
        run: "corepack enable"
      - name: "Install JS Dependencies"
        run: "yarn install --frozen-lockfile --dev"
      - name: "Run solhint"
        run: "yarn solhint"
  tests:
    name: "Hardhat Tests"
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: "Install Node"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.18.0"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"
      - name: "Enable Corepack"
        run: "corepack enable"
      - name: "Install JS Dependencies"
        run: "yarn install --frozen-lockfile --dev"
      - name: "Run tests"
        run: "yarn test:hardhat"
  forge-tests:
    name: "Forge Tests"
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: "Install Node"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: "corepack enable"
      - name: "Install Foundry"
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1
      - name: "Run tests"
        run: yarn test:forge
