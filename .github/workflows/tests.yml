name: "tests"

on:
  workflow_dispatch:
    inputs:
      run_scheduled_safety:
        description: "Run the 45-minute scheduled fuzz/invariant profile and upload its evidence"
        required: false
        default: false
        type: boolean
  pull_request:
  schedule:
    - cron: "17 6 * * 1"
  push:
    branches:
      - "main"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  CI: "true"
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  forge-tests:
    name: "Forge Build and Tests"
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      FOUNDRY_PROFILE: ci
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: "Install Node"
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Install Foundry"
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1
      - name: "Build and check Forge compiler warnings"
        run: "pnpm run compiler-warnings:forge"
      - name: "Run Forge test suite"
        run: "pnpm test"
      - name: "Enforce EIP-170 contract sizes"
        run: "pnpm run size:check"

  coverage:
    name: "Forge Coverage"
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: "Install Node"
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Install Foundry"
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1
      - name: "Enforce Forge LCOV baseline"
        run: "pnpm run coverage:forge"

  gas:
    name: "Forge Gas Snapshot"
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: "Install Node"
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Install Foundry"
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1
      - name: "Check key-flow gas regression"
        run: "pnpm run gas:check"

  package-consumers:
    name: "Package Consumers"
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: "Install Node"
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Install Foundry"
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1
      - name: "Test packed package consumers"
        run: "pnpm run test:package"

  forge-quality:
    name: "Forge Formatting and Linting"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: "Install Node"
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Install Foundry"
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1
      - name: "Check Solidity formatting"
        run: "pnpm run fmt:forge"
      - name: "Run Forge lint"
        run: "pnpm run lint:forge"

  slither:
    name: "Slither"
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: "Install Node"
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
      - name: "Install Python"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Install Slither and Solidity compiler"
        run: |
          python -m pip install --disable-pip-version-check "slither-analyzer==0.11.5"
          test "$(slither --version)" = "0.11.5"
          solc-select install 0.8.36
          solc-select use 0.8.36
          solc --version | grep -Eq '^Version: 0\.8\.36\+'
      - name: "Run Slither"
        run: "pnpm run slither"

  dependency-audit:
    name: "Dependency Audit"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: "Install Node"
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Enforce zero critical and high findings"
        run: "pnpm run audit:ratchet"

  foundry-scheduled:
    name: "Scheduled Foundry Safety"
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_scheduled_safety) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      FOUNDRY_PROFILE: scheduled
    steps:
      - name: "Generate and log rotating seed"
        id: seed
        shell: bash
        run: |
          seed="0x$(printf '%s' "${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}" | sha256sum | cut -d ' ' -f 1)"
          echo "FOUNDRY_FUZZ_SEED=$seed" >> "$GITHUB_ENV"
          echo "seed=$seed" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$seed" > "$RUNNER_TEMP/foundry-seed.txt"
          echo "Foundry seed: \`$seed\`" >> "$GITHUB_STEP_SUMMARY"
      - name: "Checkout Repo"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: "Install Node"
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
      - name: "Enable Corepack"
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.13.1
          test "$(pnpm --version)" = "11.13.1"
      - name: "Resolve pnpm Store"
        id: pnpm-cache
        run: 'echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"'
      - name: "Cache pnpm Store"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: "Install JS Dependencies"
        run: "pnpm install --frozen-lockfile"
      - name: "Install Foundry"
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          version: v1.7.1
      - name: "Run scheduled fuzz and invariant profile"
        timeout-minutes: 40
        shell: bash
        run: |
          set -o pipefail
          pnpm run test:safety:scheduled 2>&1 | tee "$RUNNER_TEMP/foundry-scheduled.log"
      - name: "Upload minimized failures, seed, and log"
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: foundry-scheduled-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            cache/fuzz
            cache/invariant
            ${{ runner.temp }}/foundry-seed.txt
            ${{ runner.temp }}/foundry-scheduled.log
          if-no-files-found: error
          retention-days: 14
